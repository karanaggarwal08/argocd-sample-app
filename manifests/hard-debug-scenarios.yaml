# Scenario 1: CrashLoopBackOff - OOMKilled
# Hard to debug because the pod restarts so fast you can't exec into it,
# and the OOM reason is buried in the previous termination state.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-crash
  namespace: sample-app
  labels:
    app: oom-crash
    scenario: memory-exhaustion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-crash
  template:
    metadata:
      labels:
        app: oom-crash
    spec:
      containers:
        - name: memory-hog
          image: python:3.11-slim
          command: ["python3", "-c", "x = []; [x.append(' ' * 10**6) for _ in range(1000)]"]
          resources:
            limits:
              memory: "32Mi"
            requests:
              memory: "16Mi"
---
# Scenario 2: CreateContainerConfigError - Missing Secret reference
# Pod stays in CreateContainerConfigError with a cryptic error.
# Hard to debug because kubectl describe shows the error briefly and it's
# not obvious which env var references the missing secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: missing-secret-ref
  namespace: sample-app
  labels:
    app: missing-secret-ref
    scenario: config-error
spec:
  replicas: 1
  selector:
    matchLabels:
      app: missing-secret-ref
  template:
    metadata:
      labels:
        app: missing-secret-ref
    spec:
      containers:
        - name: app
          image: nginx:1.25
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: external-api-secret
                  key: token
---
# Scenario 3: Readiness probe failure - Pod running but never Ready
# Extremely common in production. The pod appears "running" but gets no traffic.
# Hard to debug because logs may look normal and the probe failure reason
# is only visible in events which expire after 1 hour.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-failure
  namespace: sample-app
  labels:
    app: probe-failure
    scenario: readiness-failure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: probe-failure
  template:
    metadata:
      labels:
        app: probe-failure
    spec:
      containers:
        - name: web
          image: nginx:1.25
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
# Scenario 4: Init container stuck - references non-existent service
# Pod stuck in Init:0/1 forever. Hard to debug because the main container
# logs are empty and the issue is in the init container's logic.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: init-container-stuck
  namespace: sample-app
  labels:
    app: init-container-stuck
    scenario: init-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: init-container-stuck
  template:
    metadata:
      labels:
        app: init-container-stuck
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup postgres-primary.sample-app.svc.cluster.local; do echo "Waiting for database..."; sleep 2; done']
      containers:
        - name: app
          image: nginx:1.25
---
# Scenario 5: PVC pending - non-existent StorageClass
# Pod stuck in Pending because the PVC can't bind. Hard to debug because
# the pod events say "unbound PersistentVolumeClaims" but don't say why.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-volume
  namespace: sample-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: premium-ssd
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-pending
  namespace: sample-app
  labels:
    app: pvc-pending
    scenario: storage-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pvc-pending
  template:
    metadata:
      labels:
        app: pvc-pending
    spec:
      containers:
        - name: app
          image: nginx:1.25
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-volume
---
# Scenario 6: Service with wrong selector - no endpoints
# Service exists and resolves DNS, but connections time out.
# Extremely hard to debug because everything "looks right" until
# you notice the selector mismatch (backend-api-server vs backend-api).
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: sample-app
  labels:
    scenario: selector-mismatch
spec:
  selector:
    app: backend-api-server
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: sample-app
  labels:
    app: backend-api
    scenario: selector-mismatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: api
          image: nginx:1.25
          ports:
            - containerPort: 8080
