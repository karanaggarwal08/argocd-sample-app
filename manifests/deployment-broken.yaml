apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-broken
  namespace: sample-app
  labels:
    app: nginx-broken
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-broken
  template:
    metadata:
      labels:
        app: nginx-broken
    spec:
      containers:
        - name: nginx
          image: nginx:99.99.99
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
